name: Update AI Pulse feed

on:
  schedule:
    - cron: '0 7,19 * * *'   # 07:00 and 19:00 UTC daily
  workflow_dispatch:           # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser anthropic

      - name: Run update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update.py

      - name: Commit updated data
        run: |
          git config user.name  "AI Pulse Bot"
          git config user.email "bot@ai-pulse.noreply"
          git add data/feed.json data/history.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: update feed $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
