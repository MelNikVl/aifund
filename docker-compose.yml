version: "3.9"

services:
  web:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    restart: unless-stopped

  updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - web
