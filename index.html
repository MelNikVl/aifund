<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pulse — AI Industry Momentum Dashboard</title>
<meta name="description" content="Real-time momentum scores for OpenAI, Anthropic, Google, Meta, DeepSeek, Mistral, xAI and Perplexity. Updated twice daily from top AI news sources.">
<meta name="keywords" content="AI news, OpenAI, Anthropic, DeepSeek, Perplexity, Google AI, Meta AI, Mistral, xAI, AI industry tracker">
<link rel="canonical" href="https://app.ai-groundtruth.com">
<meta property="og:title" content="AI Pulse — AI Industry Momentum Dashboard">
<meta property="og:description" content="Daily momentum scores for top AI companies. Who is winning today?">
<meta property="og:url" content="https://app.ai-groundtruth.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="AI Pulse">
<meta name="twitter:description" content="Daily momentum scores for OpenAI, Anthropic, Google, Meta, DeepSeek, Mistral, xAI, Perplexity.">
<style>
  :root {
    --bg:      #0a0a0a;
    --surface: #111111;
    --border:  #222222;
    --text:    #e8e8e8;
    --muted:   #666666;
    --accent:  #e8e8e8;
    --up:      #4ade80;
    --down:    #f87171;
    --mono:    'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  .shell {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 28px;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo span { color: var(--muted); font-weight: 400; }

  /* ── Update timestamp block ── */
  .update-block {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 14px;
    flex-wrap: wrap;
  }

  .update-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .update-time {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
  }

  .update-ago {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  .update-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--up);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Section labels ── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  section { margin-bottom: 32px; }

  /* ── Score grid ── */
  .scores {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .score-card {
    background: var(--surface);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .score-company {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .score-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .score-value {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }

  .score-delta {
    font-size: 13px;
    font-weight: 700;
  }

  .score-delta.up   { color: var(--up);   }
  .score-delta.down { color: var(--down); }
  .score-delta.flat { color: var(--muted);}

  .score-bar-track {
    height: 3px;
    background: var(--border);
    width: 100%;
  }

  .score-bar-fill {
    height: 100%;
    background: var(--text);
  }

  /* ── Sparkline chart ── */
  .sparkline-wrap {
    width: 100%;
    height: 40px;
    position: relative;
  }

  .sparkline-wrap svg {
    width: 100%;
    height: 100%;
  }

  .badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 2px 6px;
    color: var(--muted);
    align-self: flex-start;
  }

  .badge.release    { border-color: #4ade80; color: #4ade80; }
  .badge.agents     { border-color: #60a5fa; color: #60a5fa; }
  .badge.regulatory { border-color: #fbbf24; color: #fbbf24; }
  .badge.controversy{ border-color: #f87171; color: #f87171; }
  .badge.open-model { border-color: #a78bfa; color: #a78bfa; }
  .badge.quiet      { border-color: #444;    color: #555;    }

  /* ── Signals ── */
  .signal-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }

  .signal-item {
    background: var(--surface);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 90px 1fr 70px 80px;
    gap: 12px;
    align-items: start;
  }

  @media (max-width: 600px) {
    .signal-item {
      grid-template-columns: 1fr;
      gap: 4px;
    }
    .signal-tag, .signal-date { justify-self: start; }
  }

  .signal-company {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding-top: 1px;
  }

  .signal-text {
    color: var(--text);
    font-size: 12px;
    line-height: 1.6;
  }

  .signal-tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 6px;
    justify-self: end;
    white-space: nowrap;
  }

  .signal-date {
    font-size: 10px;
    color: var(--muted);
    justify-self: end;
    padding-top: 2px;
    white-space: nowrap;
  }

  /* ── Drama block ── */
  .drama-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  @media (max-width: 480px) {
    .drama-grid { grid-template-columns: 1fr; }
  }

  .drama-card {
    background: var(--surface);
    padding: 16px;
  }

  .drama-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .drama-label.winner { color: var(--up);   }
  .drama-label.loser  { color: var(--down); }

  .drama-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }

  .drama-text {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ── History chart ── */
  .history-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    overflow-x: auto;
  }

  .history-chart-container {
    position: relative;
    min-width: 500px;
  }

  .history-svg {
    width: 100%;
    display: block;
  }

  .history-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-item.active .legend-dot {
    box-shadow: 0 0 4px currentColor;
  }

  /* ── Prediction Markets ── */
  .bets-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }

  .bet-item {
    background: var(--surface);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .bet-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .bet-question {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    flex: 1;
  }

  .bet-meta {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    padding-top: 2px;
  }

  .bet-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bet-bar-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    position: relative;
    border-radius: 2px;
    overflow: hidden;
  }

  .bet-bar-yes {
    height: 100%;
    background: var(--up);
    transition: width 0.4s ease;
    border-radius: 2px;
  }

  .bet-pct {
    font-size: 11px;
    font-weight: 700;
    min-width: 36px;
    text-align: right;
  }

  .bet-pct.yes { color: var(--up); }
  .bet-pct.no  { color: var(--down); }

  .bet-votes {
    font-size: 10px;
    color: var(--muted);
  }

  .bet-actions {
    display: flex;
    gap: 6px;
  }

  .bet-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .bet-btn:hover { border-color: var(--text); color: var(--text); }
  .bet-btn.yes:hover { border-color: var(--up); color: var(--up); }
  .bet-btn.no:hover  { border-color: var(--down); color: var(--down); }
  .bet-btn.voted-yes { border-color: var(--up); color: var(--up); background: rgba(74,222,128,0.08); }
  .bet-btn.voted-no  { border-color: var(--down); color: var(--down); background: rgba(248,113,113,0.08); }

  .bet-resolved {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid;
    align-self: flex-start;
  }

  .bet-resolved.yes { border-color: var(--up); color: var(--up); }
  .bet-resolved.no  { border-color: var(--down); color: var(--down); }
  .bet-resolved.expired { border-color: #444; color: #555; }

  .bet-resolution-text {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  /* ── Error / loading ── */
  .state-msg {
    padding: 32px;
    text-align: center;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 0.06em;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.06em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 4px;
  }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="header-top">
      <div class="logo">AI <span>//</span> Pulse</div>
    </div>
    <div class="update-block">
      <div class="update-dot"></div>
      <div class="update-label">Last updated</div>
      <div class="update-time" id="update-time">—</div>
      <div class="update-ago" id="update-ago">—</div>
    </div>
  </header>

  <section id="section-scores">
    <div class="section-label">Model momentum &mdash; score 0&ndash;100</div>
    <div id="scores-container" class="state-msg">fetching data&hellip;</div>
  </section>

  <section id="section-history">
    <div class="section-label">Score history &mdash; last 30 days</div>
    <div id="history-container" class="state-msg">fetching data&hellip;</div>
  </section>

  <section id="section-signals">
    <div class="section-label">Top signals</div>
    <div id="signals-container" class="state-msg">fetching data&hellip;</div>
  </section>

  <section id="section-drama">
    <div class="section-label">Drama of the day</div>
    <div id="drama-container" class="state-msg">fetching data&hellip;</div>
  </section>

  <section id="section-bets">
    <div class="section-label">Prediction markets &mdash; vote YES / NO</div>
    <div id="bets-container" class="state-msg">fetching data&hellip;</div>
  </section>

  <footer>
    <span>AI Pulse &mdash; auto-updated 07:00 &amp; 19:00 UTC</span>
    <span id="footer-ts"></span>
  </footer>

</div>

<script>
(function () {
  'use strict';

  // Company colors for charts
  const COMPANY_COLORS = {
    'OpenAI':     '#e8e8e8',
    'Anthropic':  '#f97316',
    'Google':     '#60a5fa',
    'Meta':       '#a78bfa',
    'DeepSeek':   '#4ade80',
    'Mistral':    '#fbbf24',
    'xAI':        '#f87171',
    'Perplexity': '#22d3ee',
    'Bittensor':  '#818cf8',
    'Gonka':      '#34d399',
    'Cocoon':     '#2dd4bf',
  };

  function getColor(name) {
    return COMPANY_COLORS[name] || '#888888';
  }

  // ── Helpers ──────────────────────────────────────────────────────────────

  function timeAgo(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 2)  return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function formatDateTime(isoStr) {
    const d = new Date(isoStr);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())} UTC`;
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function badgeClass(badge) {
    return (badge || 'quiet').toLowerCase().replace(/\s+/g, '-');
  }

  function deltaStr(d) {
    if (d > 0) return `+${d}`;
    if (d < 0) return `${d}`;
    return '±0';
  }

  function deltaClass(d) {
    if (d > 0) return 'up';
    if (d < 0) return 'down';
    return 'flat';
  }

  // ── Smooth curve helper (Catmull-Rom → cubic bezier) ─────────────────────

  function smoothPath(xs, ys) {
    if (xs.length < 2) return '';
    const pts = xs.map((x, i) => [x, ys[i]]);
    let d = `M${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[Math.max(i - 1, 0)];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[Math.min(i + 2, pts.length - 1)];
      const t = 0.4;
      const cp1x = p1[0] + (p2[0] - p0[0]) * t;
      const cp1y = p1[1] + (p2[1] - p0[1]) * t;
      const cp2x = p2[0] - (p3[0] - p1[0]) * t;
      const cp2y = p2[1] - (p3[1] - p1[1]) * t;
      d += ` C${cp1x.toFixed(2)},${cp1y.toFixed(2)} ${cp2x.toFixed(2)},${cp2y.toFixed(2)} ${p2[0].toFixed(2)},${p2[1].toFixed(2)}`;
    }
    return d;
  }

  // ── Sparkline ────────────────────────────────────────────────────────────

  function buildSparkline(points, color) {
    if (!points || points.length < 2) return '';
    const W = 160, H = 44, padX = 2, padY = 4;
    const min = Math.min(...points);
    const max = Math.max(...points);
    const range = max - min || 4;
    const xs = points.map((_, i) => padX + (i / (points.length - 1)) * (W - padX * 2));
    const ys = points.map(v => H - padY - ((v - min) / range) * (H - padY * 2));

    const linePath = smoothPath(xs, ys);
    // Area: close down to bottom
    const areaPath = linePath
      + ` L${xs[xs.length-1].toFixed(2)},${H} L${xs[0].toFixed(2)},${H} Z`;

    const id = 'sp' + Math.random().toString(36).slice(2);
    const lastX = xs[xs.length - 1];
    const lastY = ys[ys.length - 1];
    const firstY = ys[0];
    const trend = lastY < firstY ? color : '#f87171'; // up = color, down = red

    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#${id})"/>
      <path d="${linePath}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${lastX.toFixed(2)}" cy="${lastY.toFixed(2)}" r="2.5" fill="${color}"/>
    </svg>`;
  }

  // ── History chart ────────────────────────────────────────────────────────

  function buildHistoryChart(history, activeCompanies) {
    if (!history || history.length < 2) return '<div class="state-msg">not enough history data yet</div>';

    const W = 820, H = 260, padL = 36, padR = 16, padT = 16, padB = 28;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;

    const allNames = Array.from(new Set(history.flatMap(h => (h.scores || []).map(s => s.name))));

    const series = {};
    allNames.forEach(name => {
      series[name] = history.map(h => {
        const s = (h.scores || []).find(s => s.name === name);
        return s ? s.score : null;
      });
    });

    let svg = `<svg class="history-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

    // Background
    svg += `<rect x="${padL}" y="${padT}" width="${chartW}" height="${chartH}" fill="#0d0d0d"/>`;

    // Y grid lines + labels
    [0, 25, 50, 75, 100].forEach(v => {
      const y = padT + chartH - (v / 100) * chartH;
      const isNeutral = v === 50;
      svg += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}"
        stroke="${isNeutral ? '#2a2a2a' : '#1a1a1a'}"
        stroke-width="${isNeutral ? 1.5 : 1}"
        stroke-dasharray="${isNeutral ? '6,3' : 'none'}"/>`;
      svg += `<text x="${padL - 6}" y="${(y + 3.5).toFixed(1)}"
        text-anchor="end" font-size="9" fill="#444" font-family="monospace">${v}</text>`;
    });

    // X axis date labels
    const step = Math.max(1, Math.floor(history.length / 8));
    history.forEach((h, i) => {
      if (i % step === 0 && h.updated_at) {
        const x = padL + (i / (history.length - 1)) * chartW;
        const label = h.updated_at.slice(5, 10);
        svg += `<line x1="${x.toFixed(1)}" y1="${padT}" x2="${x.toFixed(1)}" y2="${(padT + chartH).toFixed(1)}"
          stroke="#1a1a1a" stroke-width="1"/>`;
        svg += `<text x="${x.toFixed(1)}" y="${H - 8}"
          text-anchor="middle" font-size="9" fill="#444" font-family="monospace">${label}</text>`;
      }
    });

    // Neutral label
    const y50 = padT + chartH - (50 / 100) * chartH;
    svg += `<text x="${W - padR + 4}" y="${(y50 + 3).toFixed(1)}"
      font-size="8" fill="#333" font-family="monospace">50</text>`;

    // Draw lines with smooth curves + area fill
    allNames.forEach(name => {
      if (activeCompanies && !activeCompanies.has(name)) return;
      const color = getColor(name);
      const pts = series[name];

      const coords = pts.map((v, i) => {
        if (v === null) return null;
        return [
          padL + (i / (history.length - 1)) * chartW,
          padT + chartH - (v / 100) * chartH
        ];
      });

      // Split into segments (handle nulls)
      const segments = [];
      let seg = [];
      coords.forEach(c => {
        if (c === null) { if (seg.length > 1) segments.push(seg); seg = []; }
        else seg.push(c);
      });
      if (seg.length > 1) segments.push(seg);

      segments.forEach(seg => {
        const xs = seg.map(c => c[0]);
        const ys = seg.map(c => c[1]);
        const linePath = smoothPath(xs, ys);

        // Area gradient
        const gradId = 'hg' + Math.random().toString(36).slice(2);
        svg += `<defs>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
          </linearGradient>
        </defs>`;

        const areaPath = linePath
          + ` L${xs[xs.length-1].toFixed(2)},${(padT + chartH).toFixed(2)}`
          + ` L${xs[0].toFixed(2)},${(padT + chartH).toFixed(2)} Z`;
        svg += `<path d="${areaPath}" fill="url(#${gradId})"/>`;
        svg += `<path d="${linePath}" fill="none" stroke="${color}" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`;
      });

      // Last point — glowing dot
      const last = coords.filter(Boolean).pop();
      if (last) {
        svg += `<circle cx="${last[0].toFixed(2)}" cy="${last[1].toFixed(2)}" r="4" fill="${color}" opacity="0.2"/>`;
        svg += `<circle cx="${last[0].toFixed(2)}" cy="${last[1].toFixed(2)}" r="2.5" fill="${color}"/>`;
      }
    });

    // Border
    svg += `<rect x="${padL}" y="${padT}" width="${chartW}" height="${chartH}"
      fill="none" stroke="#222" stroke-width="1"/>`;

    svg += '</svg>';

    // Legend — split central vs DeAI
    const DEAI = new Set(['Bittensor', 'Gonka', 'Cocoon']);
    const centralNames = allNames.filter(n => !DEAI.has(n));
    const deaiNames = allNames.filter(n => DEAI.has(n));

    function legendItems(names) {
      return names.map(name => {
        const active = !activeCompanies || activeCompanies.has(name);
        const color = getColor(name);
        return `<div class="legend-item ${active ? 'active' : ''}" data-name="${esc(name)}" style="color:${color}">
          <div class="legend-dot" style="background:${color}"></div>
          <span>${esc(name)}</span>
        </div>`;
      }).join('');
    }

    const legend = `<div class="history-legend">
      ${legendItems(centralNames)}
      ${deaiNames.length ? `<span style="color:#333;margin:0 4px">|</span>${legendItems(deaiNames)}` : ''}
    </div>`;

    return `<div class="history-wrap">
      <div class="history-chart-container">${svg}</div>
      ${legend}
    </div>`;
  }

  // ── Render ───────────────────────────────────────────────────────────────

  function renderScores(scores, history) {
    const sparkData = {};
    if (history && history.length > 1) {
      history.forEach(h => {
        (h.scores || []).forEach(s => {
          if (!sparkData[s.name]) sparkData[s.name] = [];
          sparkData[s.name].push(s.score);
        });
      });
    }

    const DEAI = new Set(['Bittensor', 'Gonka', 'Cocoon']);
    const central = scores.filter(s => !DEAI.has(s.name));
    const deai = scores.filter(s => DEAI.has(s.name));

    function renderGroup(group) {
      return group.map(s => {
        const pts = sparkData[s.name] || [];
        const color = getColor(s.name);
        const spark = pts.length >= 2 ? buildSparkline(pts, color) : '';
        return `<div class="score-card">
          <div class="score-company">${esc(s.name)}</div>
          <div class="score-row">
            <span class="score-value" style="color:${color}">${s.score}</span>
            <span class="score-delta ${deltaClass(s.delta)}">${deltaStr(s.delta)}</span>
          </div>
          <div class="score-bar-track">
            <div class="score-bar-fill" style="width:${Math.min(100, Math.max(0, s.score))}%;background:${color}"></div>
          </div>
          ${spark ? `<div class="sparkline-wrap">${spark}</div>` : ''}
          <span class="badge ${badgeClass(s.badge)}">${esc(s.badge)}</span>
        </div>`;
      }).join('');
    }

    let html = `<div class="scores">${renderGroup(central)}</div>`;
    if (deai.length > 0) {
      html += `<div class="section-label" style="margin-top:16px">Decentralized AI &mdash; network momentum</div>
               <div class="scores">${renderGroup(deai)}</div>`;
    }
    return html;
  }

  function renderSignals(signals) {
    return `<div class="signal-list">${signals.map(s => `
      <div class="signal-item">
        <div class="signal-company">${esc(s.company)}</div>
        <div class="signal-text">${esc(s.text)}</div>
        <div class="signal-tag">${esc(s.tag)}</div>
        <div class="signal-date">${esc(s.date || '')}</div>
      </div>`).join('')}</div>`;
  }

  function renderDrama(winner, loser) {
    return `<div class="drama-grid">
      <div class="drama-card">
        <div class="drama-label winner">&#9650; winner of the day</div>
        <div class="drama-name">${esc(winner.name)}</div>
        <div class="drama-text">${esc(winner.text)}</div>
      </div>
      <div class="drama-card">
        <div class="drama-label loser">&#9660; loser of the day</div>
        <div class="drama-name">${esc(loser.name)}</div>
        <div class="drama-text">${esc(loser.text)}</div>
      </div>
    </div>`;
  }

  // ── History chart interaction ─────────────────────────────────────────────

  let activeCompanies = null;
  let historyData = null;

  function attachLegendHandlers() {
    document.querySelectorAll('.legend-item').forEach(el => {
      el.addEventListener('click', function () {
        const name = this.dataset.name;
        if (!activeCompanies) {
          // First click — hide all except clicked
          const allNames = Array.from(document.querySelectorAll('.legend-item')).map(e => e.dataset.name);
          activeCompanies = new Set([name]);
        } else if (activeCompanies.has(name)) {
          activeCompanies.delete(name);
          if (activeCompanies.size === 0) activeCompanies = null; // reset = show all
        } else {
          activeCompanies.add(name);
        }
        redrawHistory();
      });
    });
  }

  function redrawHistory() {
    if (!historyData) return;
    document.getElementById('history-container').innerHTML = buildHistoryChart(historyData, activeCompanies);
    attachLegendHandlers();
  }

  // ── Prediction Markets ───────────────────────────────────────────────────

  // Votes stored in localStorage per question id
  function getVoted(id) {
    try { return localStorage.getItem('vote_' + id); } catch { return null; }
  }
  function setVoted(id, v) {
    try { localStorage.setItem('vote_' + id, v); } catch {}
  }

  function daysUntil(isoStr) {
    const diff = new Date(isoStr).getTime() - Date.now();
    const days = Math.ceil(diff / 86400000);
    if (days < 0) return 'overdue';
    if (days === 0) return 'today';
    return `${days}d left`;
  }

  function renderBets(bets) {
    const questions = (bets.questions || []).slice().reverse(); // newest first
    const open = questions.filter(q => q.status === 'open');
    const closed = questions.filter(q => q.status !== 'open');

    if (!questions.length) {
      return '<div class="state-msg">no predictions yet — check back soon</div>';
    }

    function renderQuestion(q) {
      const total = (q.yes_votes || 0) + (q.no_votes || 0);
      const yesPct = total > 0 ? Math.round((q.yes_votes / total) * 100) : 50;
      const noPct = 100 - yesPct;
      const voted = getVoted(q.id);

      let statusHtml = '';
      let actionsHtml = '';

      if (q.status === 'open') {
        const timeLeft = daysUntil(q.resolves_at);
        statusHtml = `<div class="bet-meta">resolves ${timeLeft}</div>`;
        actionsHtml = `<div class="bet-actions">
          <button class="bet-btn yes ${voted === 'yes' ? 'voted-yes' : ''}"
            onclick="window.castVote('${q.id}', 'yes')">
            ${voted === 'yes' ? '✓ ' : ''}YES
          </button>
          <button class="bet-btn no ${voted === 'no' ? 'voted-no' : ''}"
            onclick="window.castVote('${q.id}', 'no')">
            ${voted === 'no' ? '✓ ' : ''}NO
          </button>
          <span class="bet-votes">${total} vote${total !== 1 ? 's' : ''}</span>
        </div>`;
      } else if (q.status === 'resolved') {
        statusHtml = `<div class="bet-resolved ${q.resolution}">${q.resolution === 'yes' ? '✓ YES' : '✗ NO'}</div>`;
        if (q.resolution_text) {
          actionsHtml = `<div class="bet-resolution-text">${esc(q.resolution_text)}</div>`;
        }
      } else {
        statusHtml = `<div class="bet-resolved expired">expired</div>`;
      }

      return `<div class="bet-item" id="bet-${q.id}">
        <div class="bet-header">
          <div class="bet-question">${esc(q.text)}</div>
          ${statusHtml}
        </div>
        <div class="bet-bar-wrap">
          <span class="bet-pct yes">${yesPct}%</span>
          <div class="bet-bar-track">
            <div class="bet-bar-yes" style="width:${yesPct}%"></div>
          </div>
          <span class="bet-pct no">${noPct}%</span>
        </div>
        ${actionsHtml}
      </div>`;
    }

    let html = '<div class="bets-list">';
    open.forEach(q => { html += renderQuestion(q); });
    if (closed.length > 0) {
      html += `<div class="section-label" style="margin:0;padding:10px 14px;background:var(--bg)">
        Resolved &amp; expired</div>`;
      closed.slice(0, 10).forEach(q => { html += renderQuestion(q); });
    }
    html += '</div>';
    return html;
  }

  // Global vote handler
  let _betsData = null;
  window.castVote = function(id, side) {
    if (!_betsData) return;
    const prev = getVoted(id);
    const q = (_betsData.questions || []).find(q => q.id === id);
    if (!q || q.status !== 'open') return;

    // Undo previous vote
    if (prev === 'yes') q.yes_votes = Math.max(0, (q.yes_votes || 0) - 1);
    if (prev === 'no')  q.no_votes  = Math.max(0, (q.no_votes  || 0) - 1);

    // Cast new vote (toggle if same)
    if (prev !== side) {
      if (side === 'yes') q.yes_votes = (q.yes_votes || 0) + 1;
      if (side === 'no')  q.no_votes  = (q.no_votes  || 0) + 1;
      setVoted(id, side);
    } else {
      setVoted(id, null);
      localStorage.removeItem('vote_' + id);
    }

    // Re-render bets section
    document.getElementById('bets-container').innerHTML = renderBets(_betsData);
  };

  // ── Mount ────────────────────────────────────────────────────────────────

  function mount(data, history, bets) {
    // Prominent timestamp
    document.getElementById('update-time').textContent = formatDateTime(data.updated_at);
    document.getElementById('update-ago').textContent = timeAgo(data.updated_at);
    document.getElementById('footer-ts').textContent = formatDateTime(data.updated_at);

    document.getElementById('scores-container').outerHTML =
      `<div id="scores-container">${renderScores(data.scores, history)}</div>`;

    historyData = history;
    document.getElementById('history-container').innerHTML = buildHistoryChart(history, null);
    attachLegendHandlers();

    document.getElementById('signals-container').outerHTML =
      `<div id="signals-container">${renderSignals(data.signals)}</div>`;
    document.getElementById('drama-container').outerHTML =
      `<div id="drama-container">${renderDrama(data.winner, data.loser)}</div>`;

    _betsData = bets;
    document.getElementById('bets-container').innerHTML = renderBets(bets);
  }

  // ── Boot ─────────────────────────────────────────────────────────────────

  Promise.all([
    fetch('data/feed.json').then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }),
    fetch('data/history.json').then(r => r.ok ? r.json() : []).catch(() => []),
    fetch('data/bets.json').then(r => r.ok ? r.json() : {questions:[]}).catch(() => ({questions:[]}))
  ])
    .then(([feed, history, bets]) => mount(feed, history, bets))
    .catch(function (err) {
      const msg = 'data unavailable — ' + err.message;
      document.getElementById('update-time').textContent = 'unavailable';
      document.getElementById('update-ago').textContent = '';
      ['scores-container', 'signals-container', 'drama-container', 'history-container', 'bets-container'].forEach(function (id) {
        const el = document.getElementById(id);
        if (el) el.innerHTML = `<div class="state-msg">${esc(msg)}</div>`;
      });
    });
}());
</script>
</body>
</html>
