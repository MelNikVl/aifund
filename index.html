<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pulse — AI Industry Momentum Dashboard</title>
<meta name="description" content="Real-time momentum scores for OpenAI, Anthropic, DeepSeek and Perplexity. Updated twice daily from top AI news sources.">
<meta name="keywords" content="AI news, OpenAI, Anthropic, DeepSeek, Perplexity, AI industry tracker">
<link rel="canonical" href="https://app.ai-groundtruth.com">
<meta property="og:title" content="AI Pulse — AI Industry Momentum Dashboard">
<meta property="og:description" content="Daily momentum scores for top AI companies. Who is winning today?">
<meta property="og:url" content="https://app.ai-groundtruth.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="AI Pulse">
<meta name="twitter:description" content="Daily momentum scores for OpenAI, Anthropic, DeepSeek, Perplexity.">
<style>
  :root {
    --bg:      #0a0a0a;
    --surface: #111111;
    --border:  #222222;
    --text:    #e8e8e8;
    --muted:   #666666;
    --accent:  #e8e8e8;
    --up:      #4ade80;
    --down:    #f87171;
    --mono:    'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  /* ── Layout ── */
  .shell {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 6px;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo span {
    color: var(--muted);
    font-weight: 400;
  }

  .meta {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.04em;
  }

  /* ── Section labels ── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  section { margin-bottom: 32px; }

  /* ── Score grid ── */
  .scores {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .score-card {
    background: var(--surface);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .score-company {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .score-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .score-value {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }

  .score-delta {
    font-size: 13px;
    font-weight: 700;
  }

  .score-delta.up   { color: var(--up);   }
  .score-delta.down { color: var(--down); }
  .score-delta.flat { color: var(--muted);}

  .score-bar-track {
    height: 3px;
    background: var(--border);
    width: 100%;
    position: relative;
  }

  .score-bar-fill {
    height: 100%;
    background: var(--text);
    transition: width 0.4s ease;
  }

  .badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 2px 6px;
    color: var(--muted);
    align-self: flex-start;
  }

  .badge.release    { border-color: #4ade80; color: #4ade80; }
  .badge.agents     { border-color: #60a5fa; color: #60a5fa; }
  .badge.regulatory { border-color: #fbbf24; color: #fbbf24; }
  .badge.controversy{ border-color: #f87171; color: #f87171; }
  .badge.open-model { border-color: #a78bfa; color: #a78bfa; }
  .badge.quiet      { border-color: #444;    color: #555;    }

  /* ── Signals ── */
  .signal-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }

  .signal-item {
    background: var(--surface);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 90px 1fr 80px;
    gap: 12px;
    align-items: start;
  }

  @media (max-width: 520px) {
    .signal-item {
      grid-template-columns: 1fr;
      gap: 4px;
    }
    .signal-tag { justify-self: start; }
  }

  .signal-company {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding-top: 1px;
  }

  .signal-text {
    color: var(--text);
    font-size: 12px;
    line-height: 1.6;
  }

  .signal-tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 6px;
    justify-self: end;
    white-space: nowrap;
  }

  /* ── Drama block ── */
  .drama-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  @media (max-width: 480px) {
    .drama-grid { grid-template-columns: 1fr; }
  }

  .drama-card {
    background: var(--surface);
    padding: 16px;
  }

  .drama-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .drama-label.winner { color: var(--up);   }
  .drama-label.loser  { color: var(--down); }

  .drama-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }

  .drama-text {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ── Error / loading states ── */
  .state-msg {
    padding: 32px;
    text-align: center;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 0.06em;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.06em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 4px;
  }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">AI <span>//</span> Pulse</div>
    <div class="meta" id="last-updated">loading...</div>
  </header>

  <section id="section-scores">
    <div class="section-label">Model momentum &mdash; score 0&ndash;100</div>
    <div id="scores-container" class="state-msg">fetching data&hellip;</div>
  </section>

  <section id="section-signals">
    <div class="section-label">Top signals</div>
    <div id="signals-container" class="state-msg">fetching data&hellip;</div>
  </section>

  <section id="section-drama">
    <div class="section-label">Drama of the day</div>
    <div id="drama-container" class="state-msg">fetching data&hellip;</div>
  </section>

  <footer>
    <span>AI Pulse &mdash; auto-updated 07:00 &amp; 19:00 UTC</span>
    <span id="footer-ts"></span>
  </footer>

</div>

<script>
(function () {
  'use strict';

  // ── Helpers ──────────────────────────────────────────────────────────────

  function timeAgo(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 2)  return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function badgeClass(badge) {
    return (badge || 'quiet').toLowerCase().replace(/\s+/g, '-');
  }

  function deltaStr(d) {
    if (d > 0)  return `+${d}`;
    if (d < 0)  return `${d}`;
    return '±0';
  }

  function deltaClass(d) {
    if (d > 0)  return 'up';
    if (d < 0)  return 'down';
    return 'flat';
  }

  // ── Render ───────────────────────────────────────────────────────────────

  function renderScores(scores) {
    return `<div class="scores">${scores.map(s => `
      <div class="score-card">
        <div class="score-company">${esc(s.name)}</div>
        <div class="score-row">
          <span class="score-value">${s.score}</span>
          <span class="score-delta ${deltaClass(s.delta)}">${deltaStr(s.delta)}</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:${Math.min(100, Math.max(0, s.score))}%"></div>
        </div>
        <span class="badge ${badgeClass(s.badge)}">${esc(s.badge)}</span>
      </div>`).join('')}</div>`;
  }

  function renderSignals(signals) {
    return `<div class="signal-list">${signals.map(s => `
      <div class="signal-item">
        <div class="signal-company">${esc(s.company)}</div>
        <div class="signal-text">${esc(s.text)}</div>
        <div class="signal-tag">${esc(s.tag)}</div>
      </div>`).join('')}</div>`;
  }

  function renderDrama(winner, loser) {
    return `<div class="drama-grid">
      <div class="drama-card">
        <div class="drama-label winner">&#9650; winner of the day</div>
        <div class="drama-name">${esc(winner.name)}</div>
        <div class="drama-text">${esc(winner.text)}</div>
      </div>
      <div class="drama-card">
        <div class="drama-label loser">&#9660; loser of the day</div>
        <div class="drama-name">${esc(loser.name)}</div>
        <div class="drama-text">${esc(loser.text)}</div>
      </div>
    </div>`;
  }

  function renderError(msg) {
    return `<div class="state-msg">${esc(msg)}</div>`;
  }

  // ── Mount ────────────────────────────────────────────────────────────────

  function mount(data) {
    document.getElementById('last-updated').textContent =
      `updated ${timeAgo(data.updated_at)}`;
    document.getElementById('footer-ts').textContent =
      new Date(data.updated_at).toISOString().replace('T', ' ').slice(0, 16) + ' UTC';

    document.getElementById('scores-container').outerHTML =
      `<div id="scores-container">${renderScores(data.scores)}</div>`;
    document.getElementById('signals-container').outerHTML =
      `<div id="signals-container">${renderSignals(data.signals)}</div>`;
    document.getElementById('drama-container').outerHTML =
      `<div id="drama-container">${renderDrama(data.winner, data.loser)}</div>`;
  }

  // ── Boot ─────────────────────────────────────────────────────────────────

  fetch('data/feed.json')
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(mount)
    .catch(function (err) {
      const msg = 'data unavailable — ' + err.message;
      document.getElementById('last-updated').textContent = 'data unavailable';
      ['scores-container', 'signals-container', 'drama-container'].forEach(function (id) {
        document.getElementById(id).outerHTML =
          `<div id="${id}">${renderError(msg)}</div>`;
      });
    });
}());
</script>
</body>
</html>
